<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Умное напоминание о дедлайнах</title>
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/components.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <h1>Smart Deadlines · Soft UI</h1>
        <p>Neumorphism-планировщик дедлайнов с учетом учебной нагрузки</p>
      </header>

      <main class="grid">
        <section class="panel">
          <h2>Добавить дедлайн</h2>
          <form id="task-form" class="form"></form>
        </section>

        <section class="panel">
          <h2>Нагрузка и напоминания</h2>
          <div id="summary" class="summary"></div>
        </section>

        <section class="panel panel-wide">
          <div class="panel-head">
            <h2>Персональные рекомендации по задачам</h2>
            <button id="clear-completed" class="button button-secondary" type="button">Удалить выполненные</button>
          </div>
          <div id="task-list" class="task-list"></div>
        </section>
      </main>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
