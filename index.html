<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Showcase Laboratory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="layout-row">
        <h1>UI Laboratory</h1>
        <div class="controls">
            <label for="themeSelect">Тема</label>
            <select id="themeSelect"></select>
            <button id="randomTheme" class="secondary-btn" type="button">Случайная</button>
        </div>
    </header>

    <main id="labGrid" class="lab-grid"></main>

    <aside class="toast" role="status" aria-live="polite">
        <strong>Theme Test Mode</strong>
        <span>Проверяй контраст, глубину, анимации и читабельность.</span>
    </aside>

    <script type="module" src="app.js"></script>
</body>
</html>
