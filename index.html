<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Дизайн-стенд</h1>
        <div class="theme-switcher">
            <label for="themeSelect">Тема</label>
            <select id="themeSelect"></select>
        </div>
    </header>
    <main>
        <article class="card">
            <h2 id="themeTitle">Демонстрация стиля</h2>
            <p id="themeDescription">Этот интерактивный блок показывает, как глобально меняются цвета, шрифты, тени и формы элементов интерфейса. Выберите другой стиль в меню сверху, чтобы увидеть трансформацию.</p>
            <div class="chips" id="themeTags"></div>
            <button class="action-btn">Подтвердить</button>
        </article>
    </main>
    <script type="module" src="app.js"></script>
</body>
</html>
