<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Дизайн-стенд</h1>
        <div class="theme-switcher">
            <select id="themeSelect">
                <option value="atomic-heart">Atomic Heart Retro</option>
                <option value="cyberpunk">Cyberpunk 2077</option>
                <option value="glassmorphism">Modern Glass</option>
                <option value="vaporwave">80s Vaporwave</option>
            </select>
        </div>
    </header>
    <main>
        <article class="card">
            <h2>Демонстрация стиля</h2>
            <p>Этот интерактивный блок показывает, как глобально меняются цвета, шрифты, тени и формы элементов интерфейса. Выберите другой стиль в меню сверху, чтобы увидеть трансформацию.</p>
            <button class="action-btn">Подтвердить</button>
        </article>
    </main>
    <script src="app.js"></script>
</body>
</html>
